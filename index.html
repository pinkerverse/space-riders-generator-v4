<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Space Riders Tiny Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron', sans-serif;
background: radial-gradient(circle at top, #1e293b, #020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:600px;
background:#0f172a;
padding:25px;
border-radius:18px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
text-align:center;
}

h1{margin:10px 0;}

input, select{
padding:10px;
margin:4px;
border-radius:8px;
border:none;
font-size:13px;
}

button{
padding:10px 16px;
margin:6px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#6366f1,#22d3ee);
color:white;
cursor:pointer;
}

button:disabled{opacity:0.5;}

.canvasWrapper{
position:relative;
margin-top:20px;
display:flex;
justify-content:center;
}

.placeholder{
width:420px;
height:420px;
display:flex;
align-items:center;
justify-content:center;
background:#111827;
border-radius:12px;
opacity:0.7;
}

#finalImage{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:420px;
border-radius:12px;
display:none;
opacity:0;
transition:opacity .4s, transform .3s;
}

#finalImage.active{
transform:translateX(-50%) scale(1.02);
box-shadow:0 0 40px rgba(34,211,238,0.35);
}

.loading{
position:absolute;
width:420px;
height:420px;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
border-radius:12px;
z-index:5;
}

.spinner{
width:35px;
height:35px;
border:4px solid #fff;
border-top:4px solid #22d3ee;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg);}}

.tapHint{font-size:12px;opacity:0;}
.tapHint.show{animation:fade 2s;}
@keyframes fade{50%{opacity:1;}}

.wallet{
font-family:'JetBrains Mono', monospace;
font-size:12px;
margin-top:10px;
}

canvas{display:none;}

</style>

</head>

<body>

<div class="container">

<h1>🚀 Space Riders Generator</h1>

<input id="nftInput" placeholder="Enter NFT ID">

<br>

<button id="genBtn" onclick="generate()">Generate</button>
<button onclick="randomRider()">Random</button>

<hr>

<h3>Create Your Own Rider</h3>

<select id="background"></select>
<select id="body"></select>
<select id="head"></select>
<select id="eyes"></select>
<select id="mouth"></select>
<select id="hat"></select>
<select id="glasses"></select>

<br>

<button onclick="generateCustom()">Create Rider</button>

<div class="canvasWrapper">

<div class="placeholder">Your Space Rider will appear here 🚀</div>

<img id="finalImage">

<div id="loading" class="loading">
<div class="spinner"></div>
</div>

</div>

<div id="hint" class="tapHint">📱 Tap & hold image to save</div>

<br>

<button onclick="download()">Download</button>

<div class="wallet">
Support: pinkerverse.eth<br>
ETH: 0x75f8571F4Ca2f00321cdc2FA469019c0f185E798
</div>

</div>

<script>

/* FULL TRAITS — COMPLETE */
const TRAITS = {

background:[
"white","red_deluxe","green","ultramarine","blue","orange","solar_flare",
"light_purple_deluxe","light_purple","old_legendary","blank_space","purple",
"yellow","aquamarine","purple_deluxe","red","pink_deluxe","emerald",
"ultramarine_deluxe","light_pink_deluxe","starry_night","pink","orange_deluxe",
"celestial_purple_void","blue_deluxe","celestial_emerald","aquamarine_deluxe",
"diamond","sn_2021","green_deluxe","blood_moon","celestial_solar_flare",
"light_pink","sn_2022","yellow_deluxe","moonlight","deep_night","sn_2929",
"celestial_moonlight","celestial_void","celestial_diamond",
"celestial_blood_moon","flat_legendary"
],

body:[
"sr_blue_suit_v2","sr_ultramarine_suit","gn_hoodie","sr_black_suit_v2",
"saturn_sweater","sr_aquamarine_suit_v2","sr_pink_suit_v2","terra_turtleneck",
"blue_college_jacket","sr_purple_suit","sr_red_suit","sr_green_suit",
"star_glow","srog_hoodie","black_sport_hoodie","sr_ultramarine_suit_v2",
"sr_purple_suit_v2","black_turtleneck","sr_green_suit_v2",
"legendary_space_hoodie","tuxedo","peaky_suit","red_college_jacket",
"sr_light_purple_suit_v2","sr_white_suit","dark_cloak","heavy_hoodie",
"blue_turtleneck","saturn_overalls","poncho","captain_suit","rider_jacket",
"sr_aquamarine_suit","space_rider","doodle_wave","blue_sport_hoodie",
"moon_overalls","sr_white_suit_v2","sr_black_suit","sr_red_suit_v2",
"star_hoodie","sr_blue_suit","yellow_bomber_jacket","purple_sr_hoodie",
"sr_light_purple_suit","grey_cape","sr_pink_suit","sr_hoodie","cloak",
"old_legendary_turtleneck","sr_icon_hoodie","divine_robe","suspenders",
"moon_sweater","pink_turtleneck","pink_bomber_jacket","sr_yellow_suit_v2",
"sr_orange_suit","black_star_hoodie","purple_turtleneck","sr_orange_suit_v2",
"riders_hoodie","srgg_hoodie","ninja_suit","viking_suit","sheriff",
"zip_up_hoodie","sr_yellow_suit","gm_hoodie","red_sport_hoodie",
"swim_suit","hippie_suit","kimono","samurai_suit","purple_cape",
"pirate","srgg_uniform","s3r0_suit","intergalactic_uniform"
],

head:[
"robot","deep_sea","jupiter","deep_space","light_purple","light_green",
"solar_flare","blush","red","sky","blue_marble","mint","blue_bowling_ball",
"purple","pink","water_bowl","sun","blood_moon","nova","tennis_ball",
"white","red_marble","purple_bowling_ball","watermelon","orange","melting",
"slam_dunk","blue","green","lavender","open_sea","s3r0_head","silver",
"yellow","home_run","golden","red_bowling_ball","transparent",
"ultramarine","purple_marble","yellow_marble","lemon"
],

eyes:[
"raised_eyebrow","normal","closed","concerned","judging","cross_eyed",
"mad","tired","calm","third_eye","wink","side_eye","patch","crying",
"messed_up","happy","in_love","roboface","evil","dot","scarface","white"
],

mouth:[
"sad","mustache","regular","happy","basic","vampire","drool","dino_smile",
"discreet","smirk","cigarette","caret","lollipop","smile","buck_tooth",
"uwu","joint","bubble_gum"
],

hat:[
"blue_cap","horns","olive_crown","headphones","purple_bandana","sr_planet",
"planetary_cap","home_planet","red_cap","red_bandana","pink_cap",
"hippie_bandana","halo","captain","pink_beanie","yellow_beanie","kitsune",
"headband","mohawk","visor","grey_beanie","lollipop","elegant_hat",
"blue_bucket_hat","ninja_band","viking_helmet","purple_cap","ufo",
"trucker_hat","beret","black_trucker_hat","black_cap","nova_bucket_hat",
"chocolate","black_crown","black_bucket_hat","pirate","punk","cowboy",
"crown","saturn","sheriff","peaky_hat","ronin_helmet",
"construction_helmet","lord_of_terror","swim_cap","ninja_mask",
"sombrero","wizard"
],

glasses:["monocle","regular","rocketman","vr","vb","gradient"]

};

/* populate dropdowns */
for(const key in TRAITS){
const select=document.getElementById(key);
select.innerHTML='<option value="">'+key+'</option>';

TRAITS[key].forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.textContent=v.replace(/_/g," ");
select.appendChild(o);
});
}

const canvas=document.createElement("canvas");
canvas.width=2000;
canvas.height=2000;
const ctx=canvas.getContext("2d");

const img=document.getElementById("finalImage");
const load=document.getElementById("loading");
const hint=document.getElementById("hint");

const order=["background","shadow","body","head","cheeks","eyes","mouth","hat","glasses"];

function draw(src){
return new Promise(r=>{
let i=new Image();
i.src=src;
i.onload=()=>{ctx.drawImage(i,0,0,2000,2000);r();}
i.onerror=()=>r();
});
}

async function generateCustom(){
load.style.display="flex";
ctx.clearRect(0,0,2000,2000);

for(const l of order){
if(l==="shadow"){await draw("traits/shadow/default.png");continue;}
if(l==="cheeks"){await draw("traits/cheeks/default.png");continue;}
let v=document.getElementById(l)?.value;
if(v){await draw("traits/"+l+"/"+v+".png");}
}

finish();
}

function finish(){
load.style.display="none";
img.src=canvas.toDataURL();
img.style.display="block";
setTimeout(()=>{img.style.opacity=1;img.classList.add("active");},50);

hint.classList.remove("show");
void hint.offsetWidth;
hint.classList.add("show");
}

function download(){
let a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="rider.png";
a.click();
}

function randomRider(){
document.getElementById("nftInput").value=Math.floor(Math.random()*8888);
}

</script>

</body>
</html>
