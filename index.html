<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Space Riders Tiny Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron', sans-serif;
background: radial-gradient(circle at top, #1e293b, #020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:540px;
background:#0f172a;
padding:25px;
border-radius:18px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
text-align:center;
}

h1{
margin:10px 0;
font-size:24px;
}

input{
padding:12px;
font-size:14px;
width:90%;
border-radius:10px;
border:none;
outline:none;
margin-top:10px;
}

button{
padding:10px 16px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:13px;
background:linear-gradient(135deg,#6366f1,#22d3ee);
color:white;
}

.donation{
margin-top:15px;
padding:12px;
background:#1f2937;
border-radius:12px;
font-size:12px;
}

/* IMAGE AREA */
.imageWrapper{
position:relative;
margin-top:20px;
}

/* FINAL IMAGE */
#finalImage{
width:100%;
max-width:420px;
border-radius:12px;
box-shadow:0 0 30px rgba(0,0,0,0.9);
display:none;
}

/* PLACEHOLDER */
.placeholder{
width:100%;
max-width:420px;
height:420px;
background:#111827;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
opacity:0.7;
}

/* LOADING */
.loading{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:420px;
height:420px;
background:rgba(0,0,0,0.7);
border-radius:12px;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

.spinner{
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid #22d3ee;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin-bottom:10px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

canvas{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>🚀 Space Riders Generator</h1>

<input id="nftInput" placeholder="4236 or OpenSea link">

<br>

<button onclick="generate()">Generate</button>
<button onclick="randomRider()">Random</button>

<div class="donation">
Support: pinkerverse.eth
</div>

<div class="imageWrapper">

<div class="placeholder" id="placeholder">
Your Space Rider will appear here 🚀
</div>

<img id="finalImage">

<div class="loading" id="loading">
<div class="spinner"></div>
Generating your Space Rider...
</div>

</div>

</div>

<script>

// ✅ 2000px CANVAS (MATCHES YOUR ASSETS)
const canvas = document.createElement("canvas");
canvas.width = 2000;
canvas.height = 2000;

const ctx = canvas.getContext("2d");

const finalImage = document.getElementById("finalImage");
const loading = document.getElementById("loading");
const placeholder = document.getElementById("placeholder");

const BASE_URL =
"https://ipfs.io/ipfs/Qma8e3QrAWVg4buufjUyLjFbjWJ7PKKNzehAct7kxgDFT6/";

// glasses above hat
const order = [
"background",
"shadow",
"body",
"head",
"eyes",
"mouth",
"hat",
"glasses",
"space shine"
];

function extractID(input){
if(input.includes("opensea")){
let parts = input.split("/");
return parts[parts.length-1];
}
return input;
}

function cleanName(str){
if(str === "^") return "caret";
return str.toLowerCase().replace(/ /g,"_").replace(/[^a-z0-9_]/g,"");
}

async function generate(){

loading.style.display = "flex";
placeholder.style.display = "none";
finalImage.style.display = "none";

const id = extractID(document.getElementById("nftInput").value);

const response = await fetch(BASE_URL + id + ".json");
const data = await response.json();

ctx.clearRect(0,0,canvas.width,canvas.height);

for(const layer of order){

if(layer === "shadow"){
await draw("traits/shadow/default.png");
continue;
}

const trait = data.attributes.find(t =>
t.trait_type.toLowerCase() === layer
);

if(trait){

let path = "traits/" +
cleanName(layer) + "/" +
cleanName(trait.value) + ".png";

await draw(path);

}

}

// hide loading
loading.style.display = "none";

// show image (no scaling distortion)
finalImage.src = canvas.toDataURL("image/png");
finalImage.style.display = "block";

}

function draw(src){
return new Promise(resolve=>{
let img = new Image();
img.src = src;
img.onload = ()=>{
ctx.drawImage(img,0,0,2000,2000); // ✅ FIXED
resolve();
};
img.onerror = ()=>resolve();
});
}

function randomRider(){
document.getElementById("nftInput").value =
Math.floor(Math.random()*8888);
generate();
}

</script>

</body>
</html>
