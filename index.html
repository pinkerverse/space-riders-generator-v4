<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Space Riders Tiny Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron', sans-serif;
background: radial-gradient(circle at top, #1e293b, #020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:540px;
background:#0f172a;
padding:25px;
border-radius:18px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
text-align:center;
}

h1{
margin:10px 0;
font-size:24px;
}

input{
padding:12px;
font-size:14px;
width:90%;
border-radius:10px;
border:none;
outline:none;
margin-top:10px;
}

button{
padding:10px 16px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:13px;
background:linear-gradient(135deg,#6366f1,#22d3ee);
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 12px #22d3ee;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.canvasWrapper{
position:relative;
margin-top:20px;
display:flex;
justify-content:center;
}

.placeholder{
width:100%;
max-width:420px;
height:420px;
display:flex;
align-items:center;
justify-content:center;
background:#111827;
border-radius:12px;
opacity:0.7;
}

#finalImage{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:420px;
border-radius:12px;
display:none;
opacity:0;
transition:opacity 0.5s ease, transform 0.4s ease;
}

#finalImage.active{
transform:translateX(-50%) scale(1.02);
box-shadow:0 0 40px rgba(34,211,238,0.35);
}

.loading{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:420px;
height:420px;
background:rgba(0,0,0,0.7);
border-radius:12px;
display:none;
align-items:center;
justify-content:center;
z-index:4;
}

.spinner{
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid #22d3ee;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.tapHint{
margin-top:10px;
font-size:12px;
opacity:0;
}

.tapHint.show{
animation:fadeHint 2s ease;
}

@keyframes fadeHint{
50%{opacity:0.9;}
}

@keyframes walletGlow {

0%{
box-shadow:0 0 6px rgba(34,211,238,0.2);
transform:scale(1);
}

50%{
box-shadow:
0 0 18px rgba(34,211,238,0.8),
0 0 30px rgba(34,211,238,0.4);
transform:scale(1.03);
}

100%{
box-shadow:0 0 6px rgba(34,211,238,0.2);
transform:scale(1);
}

}

.wallet{
font-family:'JetBrains Mono', monospace;
margin-top:15px;
font-size:18px;
font-weight:600;
color:#22d3ee;
background:rgba(34,211,238,0.08);
padding:10px 14px;
border-radius:10px;
display:inline-block;
cursor:pointer;

/* ✨ glow base */
box-shadow:0 0 8px rgba(34,211,238,0.3);

/* ✨ animation */
animation:walletGlow 2.5s ease-in-out infinite;
}

canvas{display:none;}

select{
margin:4px;
padding:8px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>🚀 Space Riders Generator</h1>

<input id="nftInput" placeholder="NFT ID or OpenSea link">

<br>

<button id="genBtn" onclick="generate()">Generate</button>
<button onclick="randomRider()">Random</button>

<hr style="margin:20px 0; opacity:0.2;">

<h3>Create Your Own Rider</h3>

<select id="background"></select>
<select id="body"></select>
<select id="head"></select>
<select id="eyes"></select>
<select id="mouth"></select>
<select id="hat"></select>
<select id="glasses"></select>
<select id="space_shine"></select>

<br>

<button onclick="generateCustom()">Create Rider</button>

<div class="canvasWrapper">

<div class="placeholder">
Your Space Rider will appear here 🚀
</div>

<img id="finalImage">

<div id="loading" class="loading">
<div class="spinner"></div>
</div>

</div>

<div id="hint" class="tapHint">
📱 Tap & hold image to save
</div>

<br>

<button onclick="download()">Download</button>
<button onclick="toggleBackground()">Toggle Background</button>
<br><br>

<select id="special_bg_select">
<option value="">Select Special Background</option>
</select>

<button onclick="applySpecialBackground()">Apply Special Background</button>
<br><br>

<select id="overlay_select">
<option value="">Select Overlay</option>
</select>

<button onclick="applyOverlay()">Apply Overlay</button>

  <br><br>

<select id="nhl_select">
<option value="">Select NHL Team</option>
</select>

<button onclick="applyNHL()">Apply NHL Team</button>

<div class="wallet">
Support: pinkerverse.eth
</div>

</div>

const OVERLAYS = [
"rainbow_morning_1","rainbow_morning_2","rider_morning","chrome_ride","grail_ride",

];

const NHL_TEAMS = [

"winnipeg_jets"

/* populate dropdowns */
for(const key in TRAITS){
const select = document.getElementById(key);
select.innerHTML = '<option value="">'+key+'</option>';

TRAITS[key].forEach(value=>{
const option = document.createElement("option");
option.value = value;
option.textContent = value.replace(/_/g," ");
select.appendChild(option);
});
}

/* ===== ENGINE ===== */

const canvas=document.createElement("canvas");
canvas.width=2000;
canvas.height=2000;
const ctx=canvas.getContext("2d");

const img=document.getElementById("finalImage");
const load=document.getElementById("loading");
const hint=document.getElementById("hint");
const genBtn=document.getElementById("genBtn");

const BASE="https://ipfs.io/ipfs/Qma8e3QrAWVg4buufjUyLjFbjWJ7PKKNzehAct7kxgDFT6/";

const order=["background","shadow","body","head","cheeks","eyes","mouth","hat","glasses","space_shine"];

window.currentOverlay = null;
window.currentSpecialBG = null;
window.currentNHL = null;

function clean(str){
if(str==="^") return "caret";
return str.toLowerCase().replace(/ /g,"_").replace(/[^a-z0-9_]/g,"");
}

function draw(src){
return new Promise(r=>{
let i=new Image();
i.src=src;
i.onload=()=>{ctx.drawImage(i,0,0,2000,2000);r();}
i.onerror=()=>r();
});
}

/* ===== GENERATOR ===== */

async function generate(){

genBtn.disabled=true;
load.style.display="flex";

const id=document.getElementById("nftInput").value;
const res=await fetch(BASE+id+".json");
const data=await res.json();

window.lastNFTData = data;
window.lastBuilderState = null;
window.bgVisible = true;

await redrawWithOverlay();

finish();
}

/* ===== BUILDER ===== */

async function generateCustom(){

window.lastBuilderState = {};
window.lastNFTData = null;
window.bgVisible = true;

for(const l of order){
window.lastBuilderState[l] = document.getElementById(l)?.value;
}

load.style.display="flex";

await redrawWithOverlay();

finish();
}

/* ===== FINISH ===== */

function finish(){
load.style.display="none";
img.src=canvas.toDataURL();
img.style.display="block";

setTimeout(()=>{
img.style.opacity=1;
img.classList.add("active");
},50);

hint.classList.remove("show");
void hint.offsetWidth;
hint.classList.add("show");

genBtn.disabled=false;
}

/* ===== OTHER ===== */

function download(){
let a=document.createElement("a");
a.href=canvas.toDataURL();
a.download="rider.png";
a.click();
}

function randomRider(){
document.getElementById("nftInput").value=Math.floor(Math.random()*8888);
generate();
}

async function toggleBackground(){

if(window.bgVisible === undefined) return;

window.bgVisible = !window.bgVisible;

ctx.clearRect(0,0,2000,2000);

/* ===== NFT MODE ===== */
if(window.lastNFTData){

for(const l of order){

// 🚀 ADD THIS LINE
if(l === "glasses") continue;

// skip original body + hat when NHL is active
if(window.currentNHL && (l === "body" || l === "hat")) continue;

if(l==="background" && !window.bgVisible) continue;

if(l==="shadow"){
await draw("traits/shadow/default.png");
continue;
}

if(l==="cheeks"){
await draw("traits/cheeks/default.png");
continue;
}

const t = window.lastNFTData.attributes.find(
a => a.trait_type.toLowerCase().replace(/ /g,"_") === l
);

if(t){
await draw("traits/"+l+"/"+clean(t.value)+".png");
}

}

}

/* ===== BUILDER MODE ===== */
else if(window.lastBuilderState){

for(const l of order){

// 🚀 ADD THIS LINE
if(l === "glasses") continue;

// skip original body + hat when NHL is active
if(window.currentNHL && (l === "body" || l === "hat")) continue;
  
if(l==="background" && !window.bgVisible) continue;

if(l==="shadow"){
await draw("traits/shadow/default.png");
continue;
}

if(l==="cheeks"){
await draw("traits/cheeks/default.png");
continue;
}

const v = window.lastBuilderState[l];

if(v){
await draw("traits/"+l+"/"+v+".png");
}

}

}

await redrawWithOverlay();

}

window.addEventListener("load", () => {

/* ===== SPECIAL BACKGROUNDS ===== */
const select = document.getElementById("special_bg_select");

SPECIAL_BACKGROUNDS.forEach(bg=>{
const option = document.createElement("option");
option.value = bg;
option.textContent = bg.replace(/_/g," ");
select.appendChild(option);
});

/* ===== OVERLAYS ===== */
const overlaySelect = document.getElementById("overlay_select");

OVERLAYS.forEach(o=>{
const option = document.createElement("option");
option.value = o;
option.textContent = o.replace(/_/g," ");
overlaySelect.appendChild(option);
});

/* ===== NHL ===== */
const nhlSelect = document.getElementById("nhl_select");

NHL_TEAMS.forEach(team=>{
const option = document.createElement("option");
option.value = team;
option.textContent = team.replace(/_/g," ");
nhlSelect.appendChild(option);
});

});

async function applySpecialBackground(){

const selected = document.getElementById("special_bg_select").value;
window.currentSpecialBG = selected;
if(!selected) return;

ctx.clearRect(0,0,2000,2000);

/* draw selected background */
await draw("traits/special_backgrounds/" + selected + ".png");

/* ===== NFT MODE ===== */
if(window.lastNFTData){

for(const l of order){

// 🚀 ADD THIS LINE
if(l === "glasses") continue;

// skip original body + hat when NHL is active
if(window.currentNHL && (l === "body" || l === "hat")) continue;

if(l==="background") continue;

if(l==="shadow"){
await draw("traits/shadow/default.png");
continue;
}

if(l==="cheeks"){
await draw("traits/cheeks/default.png");
continue;
}

const t = window.lastNFTData.attributes.find(
a => a.trait_type.toLowerCase().replace(/ /g,"_") === l
);

if(t){
await draw("traits/"+l+"/"+clean(t.value)+".png");
}

}

}

/* ===== BUILDER MODE ===== */
else if(window.lastBuilderState){

for(const l of order){

if(l === "glasses") continue;

// skip original body + hat when NHL is active
if(window.currentNHL && (l === "body" || l === "hat")) continue;

if(l==="background") continue;

if(l==="shadow"){
await draw("traits/shadow/default.png");
continue;
}

if(l==="cheeks"){
await draw("traits/cheeks/default.png");
continue;
}

const v = window.lastBuilderState[l];

if(v){
await draw("traits/"+l+"/"+v+".png");
}

}

}

if(window.currentOverlay){
await draw("traits/overlays/" + window.currentOverlay + ".png");
}
img.src = canvas.toDataURL();

}

async function applyOverlay(){

const selected = document.getElementById("overlay_select").value;

window.currentOverlay = selected || null;

await redrawWithOverlay();

}

async function applyNHL(){

const selected = document.getElementById("nhl_select").value;

window.currentNHL = selected || null;

await redrawWithOverlay();

}

async function redrawWithOverlay(){

ctx.clearRect(0,0,2000,2000);

/* ===== NFT MODE ===== */
if(window.lastNFTData){

/* background */
if(window.currentSpecialBG){
await draw("traits/special_backgrounds/" + window.currentSpecialBG + ".png");
} 
else if(window.bgVisible){

const t = window.lastNFTData.attributes.find(
a => a.trait_type.toLowerCase().replace(/ /g,"_") === "background"
);

if(t){
await draw("traits/background/"+clean(t.value)+".png");
}

}

/* rest */
for(const l of order){

// skip original body + hat when NHL is active
if(window.currentNHL && (l === "body" || l === "hat")) continue;

if(l==="background") continue;

if(l==="shadow"){
await draw("traits/shadow/default.png");
continue;
}

if(l==="cheeks"){
await draw("traits/cheeks/default.png");
continue;
}

const t = window.lastNFTData.attributes.find(
a => a.trait_type.toLowerCase().replace(/ /g,"_") === l
);

if(t){
await draw("traits/"+l+"/"+clean(t.value)+".png");
}

}

}

/* ===== BUILDER MODE ===== */
else if(window.lastBuilderState){

/* background */
if(window.currentSpecialBG){
await draw("traits/special_backgrounds/" + window.currentSpecialBG + ".png");
} 
else if(window.bgVisible){

const v = window.lastBuilderState["background"];

if(v){
await draw("traits/background/"+v+".png");
}

}

/* rest */
for(const l of order){

// skip original body + hat when NHL is active
if(window.currentNHL && (l === "body" || l === "hat")) continue;
  
if(l==="background") continue;

if(l==="shadow"){
await draw("traits/shadow/default.png");
continue;
}

if(l==="cheeks"){
await draw("traits/cheeks/default.png");
continue;
}

const v = window.lastBuilderState[l];

if(v){
await draw("traits/"+l+"/"+v+".png");
}

}

}

/* ===== OVERLAY ===== */
if(window.currentOverlay){
await draw("traits/overlays/" + window.currentOverlay + ".png");
}

/* ===== NHL ===== */
if(window.currentNHL){
await draw("traits/nhl/" + window.currentNHL + ".png");
}

/* ===== GLASSES (TOP LAYER) ===== */

// NFT mode
if(window.lastNFTData){
  const t = window.lastNFTData.attributes.find(
    a => a.trait_type.toLowerCase().replace(/ /g,"_") === "glasses"
  );

  if(t){
    await draw("traits/glasses/" + clean(t.value) + ".png");
  }
}

// Builder mode
else if(window.lastBuilderState){
  const v = window.lastBuilderState["glasses"];

  if(v){
    await draw("traits/glasses/" + v + ".png");
  }
}

/* ===== SPACE SHINE ON TOP (ONLY IF NHL ACTIVE) ===== */
if(window.currentNHL){

  // NFT mode
  if(window.lastNFTData){
    const t = window.lastNFTData.attributes.find(
      a => a.trait_type.toLowerCase().replace(/ /g,"_") === "space_shine"
    );

    if(t){
      await draw("traits/space_shine/" + clean(t.value) + ".png");
    }
  }

  // Builder mode
  else if(window.lastBuilderState){
    const v = window.lastBuilderState["space_shine"];

    if(v){
      await draw("traits/space_shine/" + v + ".png");
    }
  }

}

img.src = canvas.toDataURL();

}

</html>
