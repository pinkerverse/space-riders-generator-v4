<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Space Riders Tiny Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron', sans-serif;
background: radial-gradient(circle at top, #1e293b, #020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:540px;
background:#0f172a;
padding:25px;
border-radius:18px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
text-align:center;
}

h1{margin:10px 0;font-size:24px;}

input, select{
padding:10px;
font-size:13px;
margin:5px;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:10px 16px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:13px;
background:linear-gradient(135deg,#6366f1,#22d3ee);
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 12px #22d3ee;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

/* DONATION */
.donation{
margin-top:18px;
padding:16px;
background:linear-gradient(135deg,#1e293b,#020617);
border:1px solid rgba(34,211,238,0.4);
border-radius:14px;
font-size:13px;
line-height:1.5;
box-shadow:0 0 20px rgba(34,211,238,0.25);
}

.wallet{
font-family:'JetBrains Mono', monospace;
background:rgba(255,255,255,0.05);
padding:6px 8px;
border-radius:6px;
display:inline-block;
}

/* WRAPPER */
.canvasWrapper{
position:relative;
margin-top:20px;
display:flex;
justify-content:center;
}

.placeholder{
width:100%;
max-width:420px;
height:420px;
display:flex;
align-items:center;
justify-content:center;
background:#111827;
border-radius:12px;
opacity:0.7;
}

#finalImage{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:420px;
border-radius:12px;
display:none;
opacity:0;
transition:opacity 0.5s ease, transform 0.4s ease;
box-shadow:0 0 30px rgba(0,0,0,0.9);
z-index:2;
}

#finalImage.active{
transform:translateX(-50%) scale(1.015);
box-shadow:0 0 40px rgba(34,211,238,0.35);
}

.loading{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:420px;
height:420px;
background:rgba(0,0,0,0.7);
border-radius:12px;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:4;
}

.spinner{
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid #22d3ee;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* TAP HINT */
.tapHint{
margin-top:10px;
font-size:12px;
opacity:0;
}

.tapHint.show{
animation:fadeHint 2s ease;
}

@keyframes fadeHint{
0%{opacity:0;}
50%{opacity:0.9;}
100%{opacity:0;}
}

canvas{display:none;}

</style>

</head>

<body>

<div class="container">

<h1>🚀 Space Riders Generator</h1>

<p>Enter NFT ID</p>

<input id="nftInput">

<br>

<button id="genBtn" onclick="generate()">Generate</button>
<button onclick="randomRider()">Random</button>

<hr style="margin:20px 0; opacity:0.2;">

<h3>Create Your Own Rider</h3>

<select id="background">
<option value="">Background</option>
<option value="blue">Blue</option>
<option value="red">Red</option>
</select>

<select id="body">
<option value="">Body</option>
<option value="sr_blue_suit_v2">Blue Suit</option>
<option value="sr_red_suit">Red Suit</option>
</select>

<select id="head">
<option value="">Head</option>
<option value="blue">Blue</option>
<option value="green">Green</option>
</select>

<select id="eyes">
<option value="">Eyes</option>
<option value="normal">Normal</option>
<option value="happy">Happy</option>
</select>

<select id="mouth">
<option value="">Mouth</option>
<option value="smile">Smile</option>
<option value="smirk">Smirk</option>
</select>

<select id="hat">
<option value="">Hat</option>
<option value="blue_cap">Blue Cap</option>
<option value="crown">Crown</option>
</select>

<select id="glasses">
<option value="">Glasses</option>
<option value="regular">Regular</option>
<option value="vr">VR</option>
</select>

<br>

<button onclick="generateCustom()">Create Rider</button>

<div class="donation">
Support: pinkerverse.eth
</div>

<div class="canvasWrapper">

<div class="placeholder">
Your Space Rider will appear here 🚀
</div>

<img id="finalImage">

<div id="loading" class="loading">
<div class="spinner"></div>
</div>

</div>

<div id="hint" class="tapHint">
📱 Tap & hold image to save
</div>

<br>

<button onclick="download()">Download</button>

</div>

<script>

const canvas=document.createElement("canvas");
canvas.width=2000;
canvas.height=2000;
const ctx=canvas.getContext("2d");

const loading=document.getElementById("loading");
const finalImage=document.getElementById("finalImage");
const hint=document.getElementById("hint");
const genBtn=document.getElementById("genBtn");

const BASE="https://ipfs.io/ipfs/Qma8e3QrAWVg4buufjUyLjFbjWJ7PKKNzehAct7kxgDFT6/";

const order=["background","shadow","body","head","cheeks","eyes","mouth","hat","glasses","space shine"];

function cleanName(str){
if(str==="^")return"caret";
return str.toLowerCase().replace(/ /g,"_").replace(/[^a-z0-9_]/g,"");
}

async function generate(){

genBtn.disabled=true;
loading.style.display="flex";
finalImage.style.display="none";
finalImage.style.opacity=0;
finalImage.classList.remove("active");

const id=document.getElementById("nftInput").value;

const res=await fetch(BASE+id+".json");
const data=await res.json();

ctx.clearRect(0,0,2000,2000);

for(const layer of order){

if(layer==="shadow"){await draw("traits/shadow/default.png");continue;}
if(layer==="cheeks"){await draw("traits/cheeks/default.png");continue;}

const trait=data.attributes.find(t=>t.trait_type.toLowerCase()===layer);

if(trait){
await draw("traits/"+cleanName(layer)+"/"+cleanName(trait.value)+".png");
}

}

finish();
}

async function generateCustom(){

genBtn.disabled=true;
loading.style.display="flex";
finalImage.style.display="none";
finalImage.style.opacity=0;
finalImage.classList.remove("active");

ctx.clearRect(0,0,2000,2000);

for(const layer of order){

if(layer==="shadow"){await draw("traits/shadow/default.png");continue;}
if(layer==="cheeks"){await draw("traits/cheeks/default.png");continue;}

const value=document.getElementById(layer)?.value;

if(value){
await draw("traits/"+layer+"/"+value+".png");
}

}

finish();
}

function finish(){

loading.style.display="none";

finalImage.src=canvas.toDataURL("image/png");
finalImage.style.display="block";

setTimeout(()=>{
finalImage.style.opacity=1;
finalImage.classList.add("active");
},50);

hint.classList.remove("show");
void hint.offsetWidth;
hint.classList.add("show");

genBtn.disabled=false;
}

function draw(src){
return new Promise(r=>{
let img=new Image();
img.src=src;
img.onload=()=>{ctx.drawImage(img,0,0,2000,2000);r();}
img.onerror=()=>r();
});
}

function download(){
const link=document.createElement("a");
link.href=canvas.toDataURL();
link.download="space-rider.png";
link.click();
}

function randomRider(){
document.getElementById("nftInput").value=Math.floor(Math.random()*8888);
generate();
}

</script>

</body>
</html>
